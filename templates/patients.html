<!DOCTYPE html>
<html>
<head>

<title>Patients List</title>

<style>

table{
border-collapse:collapse;
width:70%;
}

th,td{
padding:8px;
text-align:center;
}

@media print{

button{
display:none;
}

a{
display:none;
}

}

</style>

</head>

<body>

<h2>Patients List</h2>

<button onclick="window.print()">Print</button>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Mobile</th>
<th class="action">Action</th>
</tr>

{% for p in patients %}

<tr>
<td>{{p['id']}}</td>
<td>{{p['name']}}</td>
<td>{{p['age']}}</td>
<td>{{p['gender']}}</td>
<td>{{p['mobile']}}</td>

<td class="action">
<a href="/edit/{{ p['id'] }}">Edit</a>
<a href="/delete/{{ p['id'] }}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
